services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aryaz}
      POSTGRES_USER: ${POSTGRES_USER:-aryaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aryaz}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DB_DSN: postgresql://${POSTGRES_USER:-aryaz}:${POSTGRES_PASSWORD:-aryaz}@postgres:5432/${POSTGRES_DB:-aryaz}
      MODEL_NAME: ${MODEL_NAME:-gemini-2.5-flash}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.2}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-2}
      RECURSION_LIMIT: ${RECURSION_LIMIT:-12}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-development}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-aryaz}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
